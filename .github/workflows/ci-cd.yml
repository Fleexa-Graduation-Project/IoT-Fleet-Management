name: Fleexa IoT Fleet CI/CD

on:
  workflow_dispatch:
  push:
    branches: [ main, Lambda-CI/CD-Implementation ]

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.11"

jobs:
  # ── 1. Lint & Unit Tests (pure offline — no AWS needed) ────────────────────
  test:
    name: Unit Tests & Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p logs

      - name: Run schema validation tests
        run: python -m pytest devices/tests/unit/test_schemas.py -v

      - name: Run sensor unit tests
        run: python -m pytest devices/tests/unit/test_sensors.py -v

      - name: Run actuator unit tests
        run: python -m pytest devices/tests/unit/test_actuators.py -v

      - name: Verify imports from project root
        run: |
          python -c "
          from devices.simulators.base_device import DeviceConfig
          from devices.simulators.sensors.temperature_sensor import TemperatureSensor
          from devices.simulators.sensors.light_sensor import LightSensor
          from devices.simulators.sensors.gas_sensor import GasSensor
          from devices.simulators.sensors.door_sensor import DoorSensor
          from devices.simulators.actuators.door_locker import DoorLocker
          from devices.simulators.actuators.ac_curtain_actuator import ACCurtainActuator
          print('All imports OK')
          "

  # ── 2. Build & Validate Docker Image ──────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f devices/Dockerfile \
            -t fleexa-iot-simulator:${{ github.sha }} \
            -t fleexa-iot-simulator:latest \
            .

      - name: Smoke test container (import check)
        run: |
          docker run --rm \
            -e USE_LOCALSTACK=false \
            -e MQTT_BROKER=localhost \
            fleexa-iot-simulator:${{ github.sha }} \
            python -c "
          from devices.simulators.base_device import DeviceConfig
          from devices.simulators.sensors.temperature_sensor import TemperatureSensor
          print('Docker import smoke test passed')
          "

  # ── 3. Terraform Plan — runs on every PR (dry run, no apply) ──────────────
  terraform-plan:
    name: Terraform Plan (Dry Run)
    runs-on: ubuntu-latest
    needs: test
    if: (github.ref != 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'workflow_dispatch'
    environment: AWS
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.2"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Terraform Init
        working-directory: infra-iot-fleet/terraform
        run: terraform init

      - name: Terraform Format Check
        working-directory: infra-iot-fleet/terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: infra-iot-fleet/terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra-iot-fleet/terraform
        run: |
          terraform plan \
            -var="aws_region=us-east-1" \
            -no-color \
            -out=tfplan
        continue-on-error: false

      - name: Show Plan Summary
        working-directory: infra-iot-fleet/terraform
        run: terraform show -no-color tfplan

  # ── 4. Terraform Apply — runs ONLY on push to main ────────────────────────
  terraform-deploy:
    name: Deploy Infrastructure to AWS (us-east-1)
    runs-on: ubuntu-latest
    needs: [ test, build, terraform-plan ]
    if: ((github.ref == 'refs/heads/main' || github.ref ==
      'refs/heads/Lambda-CI/CD-Implementation') && github.event_name == 'push')
      || github.event_name == 'workflow_dispatch'
    environment: AWS
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.2"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Terraform Init
        working-directory: infra-iot-fleet/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: infra-iot-fleet/terraform
        run: |
          terraform apply \
            -var="aws_region=us-east-1" \
            -auto-approve

      - name: Save Terraform Outputs
        working-directory: infra-iot-fleet/terraform
        run: terraform output -json > ../../infrastructure-outputs.json

      - name: Print IoT Endpoint
        working-directory: infra-iot-fleet/terraform
        run: |
          echo "IoT Endpoint:"
          aws iot describe-endpoint \
            --endpoint-type iot:Data-ATS \
            --region us-east-1 \
            --query endpointAddress \
            --output text

  # ── 5. Verify AWS Resources After Deploy ──────────────────────────────────
  verify-deploy:
    name: Verify AWS Deployment
    runs-on: ubuntu-latest
    needs: terraform-deploy
    if: ((github.ref == 'refs/heads/main' || github.ref ==
      'refs/heads/Lambda-CI/CD-Implementation') && github.event_name == 'push')
      || github.event_name == 'workflow_dispatch'
    environment: AWS
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - name: Verify IoT Rules exist
        run: |
          RULES=$(aws iot list-topic-rules --region us-east-1 --query 'rules[*].ruleName' --output text)
          echo "Found rules: $RULES"
          echo "$RULES" | grep -q "iot_fleet_telemetry_processor" || (echo "Rule iot_fleet_telemetry_processor missing!" && exit 1)
          echo "$RULES" | grep -q "iot_fleet_alert_processor" || (echo "Rule iot_fleet_alert_processor missing!" && exit 1)

      - name: Verify DynamoDB tables exist
        run: |
          TABLES=$(aws dynamodb list-tables --region us-east-1 --query 'TableNames' --output text)
          echo "Found tables: $TABLES"
          echo "$TABLES" | grep -q "iot-fleet-dev-telemetry" || (echo "Table iot-fleet-dev-telemetry missing!" && exit 1)
          echo "$TABLES" | grep -q "iot-fleet-dev-device-state" || (echo "Table iot-fleet-dev-device-state missing!" && exit 1)
          echo "$TABLES" | grep -q "iot-fleet-dev-alerts" || (echo "Table iot-fleet-dev-alerts missing!" && exit 1)
          echo "$TABLES" | grep -q "iot-fleet-dev-commands" || (echo "Table iot-fleet-dev-commands missing!" && exit 1)

      - name: Verify Lambda functions exist
        run: |
          FUNCS=$(aws lambda list-functions --region us-east-1 --query 'Functions[*].FunctionName' --output text)
          echo "Found functions: $FUNCS"
          echo "$FUNCS" | grep -q "processing_main_lambda" || (echo "Function processing_main_lambda missing!" && exit 1)
          echo "$FUNCS" | grep -q "iot-fleet-dev-api-service" || (echo "Function iot-fleet-dev-api-service missing!" && exit 1)
      - name: Verify IoT Things exist
        run: |
          aws iot list-things --region us-east-1 \
            --query 'things[*].thingName' --output table

      - name: Verify CA certificate is ACTIVE
        run: |
          aws iot list-ca-certificates --region us-east-1 \
            --query 'certificates[*].{ID:certificateId,Status:status}' \
            --output table
